<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Princess Polina</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Polina">
<meta name="theme-color" content="#1a0a2e">
<meta name="description" content="Princess Polina — an original retro platformer adventure. Defend the kingdom from Ivan the dragon!">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    position: fixed;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  #game {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
  }
  #rotate {
    display: none;
    position: fixed; inset: 0;
    background: #1a0a2e;
    color: #ffd9f0;
    z-index: 100;
    text-align: center;
    font-family: monospace;
    font-size: 20px;
    padding-top: 40vh;
  }
  #rotate .phone {
    font-size: 48px;
    display: block;
    margin-bottom: 16px;
    animation: spin-hint 2s ease-in-out infinite;
  }
  @keyframes spin-hint {
    0%, 40% { transform: rotate(0deg); }
    60%, 100% { transform: rotate(90deg); }
  }
  /* Phones: ask for rotation. Larger screens (tablets, resizable windows)
     keep the game visible and letterbox instead — rotating may be impossible there. */
  @media (orientation: portrait) and (max-width: 599px) {
    #rotate { display: block; }
    #game { display: none; }
  }
</style>
</head>
<body>
<canvas id="game" width="432" height="240"></canvas>
<div id="rotate"><span class="phone">&#128241;</span><span id="rotate-text">Rotate your device</span></div>
<script type="module" src="js/main.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
